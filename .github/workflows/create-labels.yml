name: Create Labels

on:
  push:
    paths:
      - '.github/labels.yml'
      - '.github/workflows/create-labels.yml'
    branches:
      - main
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create labels
        uses: actions/github-script@v7
        with:
          script: |
            const yaml = require('js-yaml');
            const fs = require('fs');
            
            const labelsConfig = yaml.load(fs.readFileSync('.github/labels.yml', 'utf8'));
            
            for (const label of labelsConfig.labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                console.log(`✓ Created label: ${label.name}`);
              } catch (error) {
                if (error.status === 422) {
                  console.log(`ℹ Label already exists: ${label.name}`);
                } else {
                  console.error(`✗ Error creating label ${label.name}:`, error.message);
                  throw error;
                }
              }
            }
